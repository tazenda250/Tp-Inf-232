<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}DataCollect Pro{% endblock %} — Santé Cameroun</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  :root {
    --primary: #185FA5;
    --primary-light: #E6F1FB;
    --accent: #1D9E75;
    --danger: #D85A30;
    --warning: #BA7517;
    --dark: #1a1a2e;
  }
  body { background: #f4f7fb; font-family: 'Segoe UI', sans-serif; }
  .sidebar {
    width: 240px; min-height: 100vh; background: var(--dark);
    position: fixed; left: 0; top: 0; z-index: 100;
    box-shadow: 2px 0 12px rgba(0,0,0,0.15);
  }
  .sidebar-brand {
    padding: 1.5rem 1rem 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .sidebar-brand h5 { color: #fff; font-weight: 700; margin: 0; font-size: 1.1rem; }
  .sidebar-brand small { color: rgba(255,255,255,0.5); font-size: 0.72rem; }
  .sidebar-nav { padding: 1rem 0; }
  .nav-section { 
    color: rgba(255,255,255,0.35); font-size: 0.68rem; 
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.75rem 1.2rem 0.3rem;
  }
  .sidebar a {
    display: flex; align-items: center; gap: 10px;
    padding: 0.55rem 1.2rem; color: rgba(255,255,255,0.7);
    text-decoration: none; font-size: 0.875rem;
    border-left: 3px solid transparent;
    transition: all 0.2s;
  }
  .sidebar a:hover, .sidebar a.active {
    background: rgba(255,255,255,0.06);
    color: #fff; border-left-color: var(--accent);
  }
  .sidebar a i { width: 16px; text-align: center; font-size: 0.9rem; }
  .main-content { margin-left: 240px; padding: 2rem; min-height: 100vh; }
  .page-header {
    background: #fff; border-radius: 12px; padding: 1.5rem 2rem;
    margin-bottom: 1.5rem; border: 1px solid #e8edf4;
    display: flex; align-items: center; justify-content: space-between;
  }
  .page-header h1 { font-size: 1.4rem; font-weight: 600; color: #1a1a2e; margin: 0; }
  .stat-card {
    background: #fff; border-radius: 12px; padding: 1.25rem 1.5rem;
    border: 1px solid #e8edf4; transition: box-shadow 0.2s;
  }
  .stat-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .stat-card .label { color: #6c757d; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--primary); }
  .card { border: 1px solid #e8edf4; border-radius: 12px; box-shadow: none; }
  .card-header { background: #f8f9fb; border-bottom: 1px solid #e8edf4; font-weight: 600; }
  .btn-primary { background: var(--primary); border-color: var(--primary); }
  .btn-primary:hover { background: #0d4a8a; border-color: #0d4a8a; }
  .badge-maladie { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 500; }
  .analysis-img { max-width: 100%; border-radius: 8px; border: 1px solid #e8edf4; }
  .metric-box {
    background: var(--primary-light); border-radius: 8px; padding: 0.75rem 1rem;
    text-align: center; border: 1px solid #B5D4F4;
  }
  .metric-box .metric-val { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
  .metric-box .metric-lbl { font-size: 0.75rem; color: #555; }
  .loading-spinner { display: none; }
  .table th { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; color: #555; }
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .main-content { margin-left: 0; padding: 1rem; }
  }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="d-flex align-items-center gap-2 mb-1">
      <i class="bi bi-heart-pulse-fill text-danger"></i>
      <h5>DataCollect Pro</h5>
    </div>
    <small>Santé Publique Cameroun</small>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Général</div>
    <a href="/" class="{{ 'active' if request.endpoint == 'index' }}">
      <i class="bi bi-grid-fill"></i> Tableau de bord
    </a>
    <a href="/collecte" class="{{ 'active' if request.endpoint == 'collecte' }}">
      <i class="bi bi-plus-circle-fill"></i> Saisie patient
    </a>
    <a href="/donnees" class="{{ 'active' if request.endpoint == 'donnees' }}">
      <i class="bi bi-table"></i> Base de données
    </a>
    <a href="/import" class="{{ 'active' if request.endpoint == 'import_data' }}">
      <i class="bi bi-upload"></i> Import CSV/Excel
    </a>
    <div class="nav-section">Analyses</div>
    <a href="/analyse" class="{{ 'active' if request.endpoint == 'analyse' }}">
      <i class="bi bi-bar-chart-fill"></i> Analyse descriptive
    </a>
    <a href="/analyse#regression" onclick="document.getElementById('tab-reg')?.click()">
      <i class="bi bi-graph-up-arrow"></i> Régression
    </a>
    <a href="/analyse#reduction" onclick="document.getElementById('tab-red')?.click()">
      <i class="bi bi-diagram-3-fill"></i> Réduction dim.
    </a>
    <a href="/analyse#classification" onclick="document.getElementById('tab-cls')?.click()">
      <i class="bi bi-cpu-fill"></i> Classification
    </a>
    <a href="/analyse#clustering" onclick="document.getElementById('tab-clu')?.click()">
      <i class="bi bi-circles-nested"></i> Clustering
    </a>
    <div class="nav-section">Données</div>
    <a href="/export/csv">
      <i class="bi bi-download"></i> Exporter CSV
    </a>
  </nav>
</aside>
<main class="main-content">
  {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
